<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="mero収支">
<title>mero 収支</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:clip}
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#f0efed;--text:#1c1917;
  --text2:#57534e;--text3:#a8a29e;--border:#e7e5e4;--border2:#d6d3d1;
  --blue:#1d4ed8;--blue-bg:#eff6ff;--green:#15803d;
  --red:#b91c1c;--warn:#b45309;--warn-bg:#fffbeb;
  --purple:#7c3aed;--purple-bg:#ede9fe;
  --sky:#0369a1;--sky-bg:#e0f2fe;
  --r:8px;--rl:12px;--sh:0 1px 3px rgba(0,0,0,.08);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1917;--bg2:#292524;--bg3:#171412;--text:#fafaf9;
  --text2:#a8a29e;--text3:#57534e;--border:#3f3b38;--border2:#57534e;
  --blue:#60a5fa;--blue-bg:#1e3a5f;--green:#4ade80;
  --red:#f87171;--warn:#fcd34d;--warn-bg:#451a03;
  --purple:#a78bfa;--purple-bg:#2e1065;
  --sky:#38bdf8;--sky-bg:#0c4a6e;
}}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;font-size:14px;color:var(--text);background:var(--bg3);min-height:100vh;overflow-x:hidden}

/* ヘッダー */
.hdr{background:var(--bg);border-bottom:1px solid var(--border);padding:0 12px;display:flex;align-items:center;justify-content:space-between;height:52px;position:fixed;top:0;left:0;right:0;z-index:200;box-shadow:var(--sh);gap:8px}
.htitle{font-size:15px;font-weight:700;white-space:nowrap}
.month-nav{display:flex;align-items:center;gap:6px;flex:1;justify-content:center}
.month-nav span{font-size:14px;font-weight:600;white-space:nowrap}
.btn-month{background:var(--bg2);border:1px solid var(--border2);border-radius:6px;font-size:16px;padding:2px 10px;cursor:pointer;color:var(--text);font-family:inherit}
.btn-month:hover{background:var(--bg3)}
.hright{display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
.dot.ok{background:#22c55e}.dot.busy{background:#f59e0b;animation:pu 1s infinite}.dot.err{background:var(--red)}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.4}}
.slabel{font-size:11px;color:var(--text3);white-space:nowrap}

/* メインタブ */
.tab-bar{background:var(--bg);border-bottom:2px solid var(--border);display:flex;overflow-x:auto;position:fixed;top:52px;left:0;right:0;z-index:199;-webkit-overflow-scrolling:touch}
.tab-bar::-webkit-scrollbar{display:none}
.mtab{padding:11px 14px;font-size:13px;font-weight:600;border:none;background:transparent;cursor:pointer;color:var(--text2);white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:inherit}
.mtab:hover{color:var(--text)}.mtab.on{color:var(--blue);border-bottom-color:var(--blue)}

/* ボディ */
.body{max-width:680px;margin:0 auto;padding:14px 6px 80px;padding-top:100px}

/* カード */
.card{background:var(--bg);border-radius:var(--rl);padding:16px;margin-bottom:12px;box-shadow:var(--sh);border:1px solid var(--border)}
.ch{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:6px}

/* 利益ヒーロー */
.profit-hero{background:var(--bg);border-radius:var(--rl);padding:20px 16px 16px;margin-bottom:12px;box-shadow:var(--sh);border:1px solid var(--border);text-align:center}
.profit-label{font-size:12px;color:var(--text2);margin-bottom:4px}
.profit-val{font-size:34px;font-weight:800;margin-bottom:14px}
.profit-val.gr{color:var(--green)}.profit-val.re{color:var(--red)}
.sum-rows{border-top:1px solid var(--border);padding-top:4px}
.sum-row{display:flex;justify-content:space-between;padding:5px 4px;font-size:14px}
.sum-lbl{color:var(--text2)}.sum-val{font-weight:600}
.sum-val.inc{color:var(--blue)}.sum-val.exp{color:var(--red)}

/* KPIグリッド */
.kgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.kpi{background:var(--bg);border-radius:var(--rl);padding:12px 14px;box-shadow:var(--sh);border:1px solid var(--border)}
.klabel{font-size:11px;color:var(--text2);margin-bottom:4px}
.kval{font-size:18px;font-weight:700;line-height:1.1}
.kval.bl{color:var(--blue)}.kval.re{color:var(--red)}.kval.gr{color:var(--green)}

/* テーブル */
.t{width:100%;border-collapse:collapse;font-size:14px}
.t th{text-align:left;padding:8px 10px;color:var(--text2);font-weight:500;font-size:12px;border-bottom:1px solid var(--border);background:var(--bg2)}
.t td{padding:10px;border-bottom:1px solid var(--border);vertical-align:middle}
.t tr:last-child td{border-bottom:none}.t tr:hover td{background:var(--bg2)}
.tr{text-align:right}.fw{font-weight:600}.mu{color:var(--text2)}
.trow td{background:var(--bg2)!important;font-weight:700;border-top:2px solid var(--border2)!important}

/* バッジ */
.chip{display:inline-block;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:500;background:var(--bg2);border:1px solid var(--border)}
.ab{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;background:var(--blue-bg);color:var(--blue);font-weight:600;margin-left:4px}
.badge-fixed{display:inline-block;font-size:11px;padding:2px 7px;border-radius:4px;background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;font-weight:600}
.badge-hourly{display:inline-block;font-size:11px;padding:2px 7px;border-radius:4px;background:#fef9c3;color:#854d0e;border:1px solid #fef08a;font-weight:600}
.badge-pct{display:inline-block;font-size:11px;padding:2px 7px;border-radius:4px;background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-bg);font-weight:600}

/* フォーム */
.fg{margin-bottom:10px}
.fg label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
input,select{width:100%;font-size:14px;font-family:inherit;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);-webkit-appearance:none;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,78,216,.12)}
input[type=number]{text-align:right}

/* ボタン */
.btn{font-family:inherit;cursor:pointer;border-radius:var(--r);font-size:14px;font-weight:500;transition:all .15s;border:none}
.bp{background:var(--blue);color:#fff;padding:8px 16px}.bp:hover{opacity:.85}
.bs{background:transparent;color:var(--red);padding:4px 8px;font-size:13px;border:none}.bs:hover{opacity:.7}
.be{background:transparent;color:var(--blue);padding:4px 6px;font-size:14px;border:none;cursor:pointer;opacity:.7}.be:hover{opacity:1}
.bo{background:transparent;color:var(--text2);padding:6px 14px;border:1px solid var(--border2);font-size:13px}.bo:hover{background:var(--bg2)}
.bd{background:var(--bg2);color:var(--text);padding:6px 14px;border:1px solid var(--border2);font-size:13px}.bd:hover{background:var(--bg3)}
.btn-add{width:100%;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}.btn-add:hover{opacity:.85}
.btn-plus{display:block;width:100%;padding:8px;background:transparent;color:var(--blue);border:1px dashed var(--blue);border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:10px;text-align:center}.btn-plus:hover{background:var(--blue-bg)}

/* 入力グリッド */
.ef{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.ef-full{grid-column:1/-1}

/* 立替バー */
.tatekae-bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.tatekae-bar span{font-size:12px;color:var(--text2)}
.tbtn{font-family:inherit;font-size:13px;font-weight:500;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .15s}
.tbtn.sekijima.on{background:var(--purple);color:#fff;border-color:var(--purple)}
.tbtn.funada.on{background:var(--sky);color:#fff;border-color:var(--sky)}

/* 領収書 */
.rec-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.rec-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border:1px dashed var(--border2);border-radius:var(--r);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit}
.rec-btn:hover{background:var(--bg2)}.rec-btn.has{border-color:var(--blue);color:var(--blue);border-style:solid}
.rec-thumb{width:48px;height:48px;object-fit:cover;border-radius:var(--r);border:1px solid var(--border);cursor:pointer}
.uploading{font-size:11px;color:var(--text3);animation:pu 1s infinite}
.rec-icon{cursor:pointer;font-size:16px;opacity:.8;background:none;border:none;padding:0}.rec-icon:hover{opacity:1}

/* フィルターバー */
.fbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.fbtn{font-family:inherit;font-size:12px;font-weight:500;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;transition:all .15s}
.fbtn:hover{background:var(--bg3)}.fbtn.on{background:var(--blue);color:#fff;border-color:var(--blue)}

/* モーダル */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:center;justify-content:center;padding:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay.show{display:flex}
.modal{background:var(--bg);border-radius:var(--rl);padding:22px;width:100%;max-width:440px;box-shadow:0 8px 32px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:700;margin-bottom:16px}
.mrow{margin-bottom:12px}
.mrow label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
.mbtns{display:flex;gap:8px;margin-top:16px}
.rimgwrap{text-align:center}.rimgwrap img{max-width:100%;max-height:70vh;border-radius:var(--r);object-fit:contain}

/* 経費テーブル（モバイル2段グリッド） */
.ec-tate{display:none}
.ec-act{white-space:nowrap}
.exp-list{border-top:1px solid var(--border)}
.exp-row{display:grid;grid-template-columns:44px auto auto 1fr auto;grid-template-rows:auto auto;column-gap:8px;row-gap:4px;padding:10px 0;border-bottom:1px solid var(--border);align-items:center}
.exp-row td,.exp-row div{font-size:14px}
.ec-tate-m{grid-area:1/1/3/2;display:flex;align-items:center;justify-content:center}
.ec-date{grid-area:1/2/3/3;display:flex;align-items:center;color:var(--text2)}
.ec-kubun{grid-area:1/3/2/4}
.ec-kamoku{grid-area:2/3/3/4;font-size:12px;color:var(--text2)}
.ec-detail{grid-area:1/4/2/5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ec-amt{grid-area:2/4/3/5;text-align:right;font-size:15px;font-weight:700}
.ec-act-m{grid-area:1/5/3/6;align-self:center;display:flex;flex-direction:column;align-items:center;gap:2px}
.exp-total{display:flex;justify-content:space-between;padding:10px 4px;font-weight:700;font-size:15px}
.krow-bg{background:var(--warn-bg)}

/* クロス集計 */
.ct{width:100%;border-collapse:collapse;font-size:13px}
.ct th{padding:7px 8px;color:var(--text2);font-weight:500;font-size:11px;border-bottom:1px solid var(--border);background:var(--bg2);text-align:right;white-space:nowrap}
.ct th:first-child{text-align:left}
.ct td{padding:7px 8px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap}
.ct td:first-child{text-align:left}
.ct tr:last-child td{border-bottom:none}.ct tr:hover td{background:var(--bg2)}
.ct .tc{font-weight:600;border-left:1px solid var(--border2)}
.ct .trow td{background:var(--bg2)!important;font-weight:700;border-top:2px solid var(--border2)!important}
.ov{overflow-x:auto}

/* タレント入力 */
.talent-card{border:1px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:10px;background:var(--bg2)}
.talent-name{font-size:15px;font-weight:700;margin-bottom:2px}
.talent-outsource{font-size:12px;color:var(--text3);margin-bottom:10px}
.chat-grid{display:grid;grid-template-columns:1fr 90px 54px 90px;gap:6px;align-items:center;margin-bottom:6px}
.chat-hdr{font-size:11px;color:var(--text3);font-weight:600}
.chat-pct{text-align:center;font-size:13px;color:var(--text2)}
.chat-amt{text-align:right;font-weight:700;font-size:14px;color:var(--text)}
.talent-total{display:flex;justify-content:space-between;border-top:1px solid var(--border);margin-top:8px;padding-top:8px;font-size:14px;font-weight:700}
.daily-section{margin:6px 0 10px;padding:8px 10px;background:var(--bg);border-radius:var(--r);border:1px solid var(--border)}
.daily-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:13px}
.daily-row input[type=date]{flex:1;font-size:13px;padding:5px 8px}
.daily-row input[type=number]{width:80px;font-size:13px;padding:5px 8px;text-align:right}
.daily-add{font-size:12px;color:var(--blue);background:none;border:1px dashed var(--blue);border-radius:var(--r);padding:4px 10px;cursor:pointer;font-family:inherit;width:100%;margin-top:4px}
.daily-add:hover{background:var(--blue-bg)}
.daily-total{font-size:12px;color:var(--red);text-align:right;margin-top:4px;font-weight:600}
.out-detail{overflow:hidden;transition:max-height .3s}

/* スタッフ行 */
.staff-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
.staff-row:last-child{border-bottom:none}
.staff-info{flex:1}
.staff-name{font-size:15px;font-weight:600}
.staff-sub{font-size:12px;color:var(--text2);margin-top:2px}
.staff-hours{width:80px;flex-shrink:0}
.staff-amt{min-width:90px;text-align:right;font-size:15px;font-weight:700}

/* マスタ行 */
.master-item{display:flex;align-items:center;gap:8px;padding:12px 0;border-bottom:1px solid var(--border)}
.master-item:last-child{border-bottom:none}
.master-info{flex:1}
.master-name{font-size:14px;font-weight:600}
.master-sub{font-size:12px;color:var(--text2);margin-top:2px}
.master-actions{display:flex;gap:4px}

/* サブタブ */
.subtabs{background:var(--bg);border-radius:var(--rl);display:flex;margin-bottom:12px;box-shadow:var(--sh);border:1px solid var(--border);overflow:hidden}
.stab{flex:1;padding:10px 4px;font-size:13px;font-weight:600;border:none;background:transparent;cursor:pointer;color:var(--text2);font-family:inherit;border-bottom:2px solid transparent;transition:all .15s}
.stab:hover{color:var(--text)}.stab.on{color:var(--blue);border-bottom-color:var(--blue);background:var(--blue-bg)}

/* 空状態 */
.empty{color:var(--text3);text-align:center;padding:24px 0;font-size:13px}

/* pbar */
.pbar{background:var(--bg);border-radius:var(--rl);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;box-shadow:var(--sh);border:1px solid var(--border)}

@media(max-width:640px){
  .kgrid{grid-template-columns:1fr 1fr}
  .body{padding:10px 4px 80px}
  .hdr{padding:0 10px}
  .chat-grid{grid-template-columns:1fr 80px 50px 80px}
}
</style>
</head>

<!-- 経費編集モーダル -->
<div class="overlay" id="editOverlay" onclick="if(event.target===this)closeEdit()">
  <div class="modal">
    <h3>✏️ 経費を編集</h3>
    <div class="mrow"><label>日付</label><input type="date" id="ed"></div>

    <div class="mrow"><label>領収書</label><div id="editRecArea" style="margin-top:4px"></div></div>

<!-- 領収書表示モーダル -->
<div class="overlay" id="recOverlay" onclick="if(event.target===this)closeRec()">
  <div class="modal" style="max-width:560px">
    <h3>🧾 領収書</h3>
    <div class="rimgwrap" id="recImgWrap"></div>
    <div class="mbtns" style="justify-content:center">
      <button class="btn bo" onclick="closeRec()" style="width:100%">閉じる</button>
    </div>
  </div>
</div>

<!-- 支払通知書モーダル -->
<div id="sendingOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700;gap:16px">
  <div style="width:44px;height:44px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite"></div>
  <div id="sendingMsg">送信中...</div>
</div>
<div class="overlay" id="noticeOverlay" onclick="if(event.target===this)closePaymentNotice()">
  <div class="modal" style="max-width:680px;padding:0">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border)">
      <span style="font-weight:700;font-size:15px">🖨️ 支払通知書</span>
      <div style="display:flex;gap:8px">
        <button class="btn bp" onclick="printNotice()">印刷（PDF）</button>
        <button class="btn bo" onclick="closePaymentNotice()">閉じる</button>
      </div>
    </div>
    <div id="noticeBody" style="padding:20px;overflow-y:auto;max-height:80vh"></div>
  </div>
</div>

<!-- マスタ編集モーダル -->
<div class="overlay" id="masterOverlay" onclick="if(event.target===this)closeMasterModal()">
  <div class="modal">
    <h3 id="masterModalTitle">マスタ編集</h3>
    <div id="masterModalBody"></div>
    <div class="mbtns">
      <button class="btn bp" onclick="saveMasterModal()" style="flex:1">保存</button>
      <button class="btn bo" onclick="closeMasterModal()">キャンセル</button>
    </div>
  </div>
</div>

/* ===== 月データアクセス ===== */
function getMonth(m){return Object.assign({income:{},talent:{},staff:{},outsource:{},expenses:[]},monthly[m]||{});}
function setMonth(m,data){monthly=Object.assign({},monthly);monthly[m]=data;scheduleSaveMonthly();}

/* ===== 計算 ===== */
function calcMonth(m){
  var md=getMonth(m);
  // 収入
  var incTotal=0,incByP={};
  master.platforms.forEach(function(p){
    var pts=+(md.income[p.id]||0);
    var amt=calcIncAmt(p,pts);
    incByP[p.id]=amt;incTotal+=amt;
  });
  // タレント報酬
  var talTotal=0,talByT={};
  master.talents.forEach(function(t){
    var tamt=0;
    (t.platforms||[]).forEach(function(pid){
      var p=master.platforms.find(function(x){return x.id===pid;});
      if(!p)return;
      var entry=((md.talent[t.id]||{})[pid])||{pts:0};
      var pts=+(entry.pts||0);
      var daily=getDailyTotal(entry);
      var rate=(t.rates&&t.rates[pid]!=null)?t.rates[pid]:p.rate;
      tamt+=Math.round((pts-daily)*rate/100);
    });
    talByT[t.id]=tamt;talTotal+=tamt;
  });
  // スタッフ報酬
  var stfTotal=0,stfByS={};
  master.staff.forEach(function(s){
    var amt=s.type==="fixed"?s.amount:((+(((md.staff||{})[s.id]||{}).hours||0))*s.amount);
    stfByS[s.id]=amt;stfTotal+=amt;
  });
  // 外注報酬
  var outTotal=0,outByO={};
  master.outsource.forEach(function(o){
    var pts=+(md.outsource[o.id]||0);
    var amt=calcOutAmt(o,pts);
    outByO[o.id]=amt;outTotal+=amt;
  });
  // 経費（関プは利益計算から除外）
  var expenses=md.expenses||[];
  var mainE=expenses.filter(function(e){return e.kubun!=="関プ";});
  var kanpuE=expenses.filter(function(e){return e.kubun==="関プ";});
  var expTotal=mainE.reduce(function(s,e){return s+(+e.amount||0);},0);
  var kanpuTotal=kanpuE.reduce(function(s,e){return s+(+e.amount||0);},0);
  var profit=incTotal-talTotal-stfTotal-outTotal-expTotal;
  return{incTotal,incByP,talTotal,talByT,stfTotal,stfByS,outTotal,outByO,expTotal,kanpuTotal,expenses,mainE,kanpuE,profit,md};
}

    var total=0;
    master.staff.forEach(function(s){
      var amt;
      if(s.type==="fixed"){
        amt=s.amount;
        h+='<div class="staff-row">';
        h+='<div class="staff-info"><div class="staff-name">'+esc(s.name)+'</div><div class="staff-sub">固定報酬</div></div>';
        h+='<span class="badge-fixed">固定</span>';
        h+='<div class="staff-amt">'+yen(amt)+'</div>';
        h+='</div>';
      }else{
        var hours=+(((md.staff||{})[s.id]||{}).hours||0);
        amt=hours*s.amount;
        h+='<div class="staff-row">';
        h+='<div class="staff-info"><div class="staff-name">'+esc(s.name)+'</div><div class="staff-sub">時給 '+yen(s.amount)+'/h</div></div>';
        h+='<span class="badge-hourly">時給</span>';
        h+='<div class="staff-hours"><input type="number" value="'+(hours||"")+'" placeholder="0" style="font-size:14px;padding:6px 8px;text-align:right" onchange="setStaffHours(\''+s.id+'\',this.value)">h</div>';
        h+='<div class="staff-amt" id="sf-'+s.id+'">'+yen(amt)+'</div>';
        h+='</div>';
      }
      total+=amt;
    });
    h+='<div class="exp-total" style="border-top:2px solid var(--border2);margin-top:4px">スタッフ報酬合計<span style="color:var(--red)">'+yen(total)+'</span></div>';
  }
  h+='</div>';
  if(lk) return '<div style="background:#fff3cd;color:#856404;border:1px solid #ffc107;border-radius:var(--r);padding:8px 14px;margin-bottom:12px;font-size:13px;text-align:center">🔒 ロック中 — 編集するには解除してください</div><div inert style="opacity:0.65">'+h+'</div>';
  return h;
}
function setStaffHours(sid,val){
  var md=getMonth(currentMonth);
  if(!md.staff) md.staff={};
  if(!md.staff[sid]) md.staff[sid]={};
  md.staff[sid].hours=parseFloat(val)||0;
  setMonth(currentMonth,md);
  var s=master.staff.find(function(x){return x.id===sid;});
  if(s){
    var el=document.getElementById("sf-"+sid);
    if(el) el.textContent=yen((parseFloat(val)||0)*s.amount);
  }
}

/* ===== 外注タブ ===== */
function renderGaichuu(){
  var lk=isLocked();
  var md=getMonth(currentMonth);
  var h="<div class=\"card\"><div class=\"ch\">🔗 外注報酬</div>";
  if(master.outsource.length===0){
    h+='<div class="empty">⚙️ マスタで外注を登録してください</div>';
  }else{
    h+='<table class="t"><thead><tr><th>外注先</th><th class="tr" style="width:110px">pt</th><th class="tr" style="width:60px">報酬率</th><th class="tr" style="width:100px">金額</th><th style="width:36px"></th></tr></thead><tbody>';
    var total=0;
    master.outsource.forEach(function(o){
      var linked=master.talents.filter(function(t){return t.outsourceId===o.id;});
      var hasLinked=linked.length>0;
      // 紐づきタレントがいる場合はポイントをタレントの合計から自動取得
      var pts;
      if(hasLinked){
        pts=0;
        linked.forEach(function(t){
          (t.platforms||[]).forEach(function(pid){
            var entry=((md.talent||{})[t.id]||{})[pid]||{pts:0,daily:0};
            pts+=+(entry.pts||0);
          });
        });
      }else{
        pts=+(md.outsource[o.id]||0);
      }
      var amt=calcOutAmt(o,pts);
      total+=amt;
      var fLabel=o.rate+'%';
      var ptCell=hasLinked
        ?'<td class="tr" style="color:var(--text2)">'+pts.toLocaleString()+'<br><span style="font-size:11px">（合計）</span></td>'
        :'<td class="tr"><input type="number" value="'+(md.outsource[o.id]||"")+'" placeholder="0" style="width:90px;padding:5px 8px;font-size:14px;text-align:right" onchange="setOutPt(\''+o.id+'\',this.value)"></td>';
      h+='<tr><td class="fw">'+esc(o.name)+'</td>';
      h+=ptCell;
      h+='<td class="tr">'+fLabel+'</td>';
      h+='<td class="tr fw" id="out-'+o.id+'">'+yen(amt)+'</td>'
        +'<td style="white-space:nowrap;padding:4px 6px">'
        +(o.formula==="abe"?'<button class="btn be" onclick="openPaymentNotice(\''+o.id+'\')" title="支払通知書">🖨️</button>':'')
        +'</td></tr>';
      // 業務委託タレント一覧（アコーディオン）
      if(hasLinked){
        h+='<tr><td colspan="4" style="padding:0">'
          +'<div style="padding:4px 10px;background:var(--bg2);border-bottom:1px solid var(--border)">'
          +'<button onclick="toggleOutDetail(\'od-'+o.id+'\')" data-orig-text="▶ 明細を表示（'+linked.length+'件）" style="background:none;border:none;cursor:pointer;font-size:12px;color:var(--text2);font-family:inherit">▶ 明細を表示（'+linked.length+'件）</button>'
          +'</div></td></tr>';
        h+='<tr id="od-'+o.id+'" style="display:none"><td colspan="4" style="padding:0">';
        h+='<table class="t" style="margin:0">';
        linked.forEach(function(t){
          var tpts=0,tamt=0;
          (t.platforms||[]).forEach(function(pid){
            var p=master.platforms.find(function(x){return x.id===pid;});
            if(!p)return;
            var entry=((md.talent||{})[t.id]||{})[pid]||{pts:0,daily:0};
            var rate=(t.rates&&t.rates[pid]!=null)?t.rates[pid]:p.rate;
            tpts+=+(entry.pts||0);
            tamt+=Math.round((+(entry.pts||0)-+(entry.daily||0))*rate/100);
          });
          h+='<tr style="background:var(--bg2)">'
            +'<td style="padding-left:16px;font-size:13px">└ '+(t.realName?esc(t.realName)+' ('+esc(t.name)+')':esc(t.name))+'</td>'
            +'<td class="tr" style="font-size:13px;color:var(--text2)">'+tpts.toLocaleString()+'pt</td>'
            +'<td class="tr" style="font-size:12px;color:var(--text2)">報酬</td>'
            +'<td class="tr fw" style="color:var(--text2)">'+yen(tamt)+'</td></tr>';
        });
        h+='</table></td></tr>';
      }
    });
    h+='<tr class="trow"><td colspan="3">外注報酬合計</td><td class="tr">'+yen(total)+'</td></tr>';
    h+='</tbody></table>';
  }
  h+='</div>';
  if(lk) return '<div style="background:#fff3cd;color:#856404;border:1px solid #ffc107;border-radius:var(--r);padding:8px 14px;margin-bottom:12px;font-size:13px;text-align:center">🔒 ロック中 — 編集するには解除してください</div><div inert style="opacity:0.65">'+h+'</div>';
  return h;
}
function setOutPt(oid,val){
  var md=getMonth(currentMonth);
  md.outsource=Object.assign({},md.outsource);
  md.outsource[oid]=parseFloat(val)||0;
  setMonth(currentMonth,md);
  var o=master.outsource.find(function(x){return x.id===oid;});
  if(o){
    var el=document.getElementById("out-"+oid);
    if(el) el.textContent=yen(calcOutAmt(o,parseFloat(val)||0));
  }
}

/* ===== 経費タブ ===== */
function renderKeihi(){
  var md=getMonth(currentMonth);
  var expenses=md.expenses||[];
  var c=calcMonth(currentMonth);
  var mainE=c.mainE, kanpuE=c.kanpuE;

  // フィルター・ソート（関プ以外）
  var filtered=expFilter==="all"?mainE.slice():mainE.filter(function(e){return e.kubun===expFilter;});
  filtered=filtered.sort(function(a,b){
    var da=a.date||"",db=b.date||"";
    if(da===db)return 0;
    return expSort==="asc"?(da<db?-1:1):(da>db?-1:1);
  });
  var filteredTotal=filtered.reduce(function(s,e){return s+(+e.amount||0);},0);

  // セレクト
  var kubunOpts="",kamokuOpts="";
  KUBUN.forEach(function(k){kubunOpts+='<option'+(k===expF.kubun?' selected':'')+'>'+k+'</option>';});
  KAMOKU.forEach(function(k){kamokuOpts+='<option'+(k===expF.kamoku?' selected':'')+'>'+k+'</option>';});

  // 立替バー
  var ts=expF.tatekae;
  var tatekaeBar='<div class="tatekae-bar"><span>立替：</span>'
    +'<button class="tbtn sekijima'+(ts==="関島"?" on":"")+'" onclick="expF.tatekae=expF.tatekae===\'関島\'?\'\':\'関島\';renderKeihi2()">関島立替</button>'
    +'<button class="tbtn funada'+(ts==="船田"?" on":"")+'" onclick="expF.tatekae=expF.tatekae===\'船田\'?\'\':\'船田\';renderKeihi2()">船田立替</button>'
    +(ts?'<span style="font-size:11px;color:var(--text3)">※もう一度で解除</span>':'')
    +'</div>';

  // 領収書エリア
  var recArea='<div class="rec-row">'
    +'<button class="rec-btn'+(expF.receiptUrl?" has":"")+'" onclick="document.getElementById(\'recInput\').click()" type="button">📎 '+(expF.receiptUrl?"領収書あり":"領収書を添付")+'</button>'
    +'<input type="file" id="recInput" accept="image/*" style="display:none" onchange="handleRec(this)">'
    +(expF.receiptUploading?'<span class="uploading">アップロード中...</span>':'')
    +(expF.receiptUrl?'<img class="rec-thumb" src="'+expF.receiptUrl+'" onclick="openRec(\''+expF.receiptUrl+'\')">':'')
    +(expF.receiptUrl?'<button class="btn bs" onclick="expF.receiptUrl=\'\';renderKeihi2()">✕</button>':'')
    +'</div>';

  // フィルターバー
  var fbarKubun=KUBUN.filter(function(k){return k!=="関プ";});
  var fbarAll=["all"].concat(fbarKubun);
  var fbar='<div class="fbar">';
  fbarAll.forEach(function(k){
    var cnt=k==="all"?mainE.length:mainE.filter(function(e){return e.kubun===k;}).length;
    var lbl=k==="all"?"すべて":k;
    fbar+='<button class="fbtn'+(expFilter===k?" on":"")+'" onclick="setExpFilter(\''+k+'\')">'+lbl+(cnt>0?' <span style="opacity:.7;font-size:11px">('+cnt+')</span>':'')+' </button>';
  });
  fbar+='<div style="margin-left:auto;display:flex;gap:4px">';
  fbar+='<button class="fbtn'+(expSort==="asc"?" on":"")+'" onclick="setExpSort(\'asc\')">↑ 古い順</button>';
  fbar+='<button class="fbtn'+(expSort==="desc"?" on":"")+'" onclick="setExpSort(\'desc\')">↓ 新しい順</button>';
  fbar+='</div></div>';

  // 経費行（モバイル2段グリッド）
  function expRowHtml(e){
    var tateMobile="",recBtn=e.receiptUrl?'<button class="rec-icon" onclick="openRec(\''+e.receiptUrl+'\')" >🧾</button>':"";
    if(e.tatekae==="関島") tateMobile='<span style="font-size:11px;font-weight:700;color:var(--purple);text-align:center;line-height:1.4">関島<br>立替</span>';
    else if(e.tatekae==="船田") tateMobile='<span style="font-size:11px;font-weight:700;color:var(--sky);text-align:center;line-height:1.4">船田<br>立替</span>';
    return '<div class="exp-row">'
      +'<div class="ec-tate-m">'+tateMobile+'</div>'
      +'<div class="ec-date">'+fdt(e.date)+'</div>'
      +'<div class="ec-kubun"><span class="chip">'+esc(e.kubun)+'</span>'+recBtn+'</div>'
      +'<div class="ec-kamoku">'+esc(e.kamoku)+'</div>'
      +'<div class="ec-detail">'+esc(e.detail)+'</div>'
      +'<div class="ec-amt">'+yen(+e.amount||0)+'</div>'
      +'<div class="ec-act-m">'
      +'<button class="btn be" onclick="openEdit(\''+e.id+'\')">✏️</button>'
      +'<button class="btn bs" onclick="delExp(\''+e.id+'\')">✕</button>'
      +'</div></div>';
  }

  var listHtml="";
  if(filtered.length>0){
    filtered.forEach(function(e){listHtml+=expRowHtml(e);});
  }else{
    listHtml='<div class="empty">該当する経費がありません</div>';
  }

  // クロス集計（関プ除く）
  var crossKubun=KUBUN.filter(function(k){return k!=="関プ";});
  var cross={};
  KAMOKU.forEach(function(k){cross[k]={};crossKubun.forEach(function(ku){cross[k][ku]=0;});});
  mainE.forEach(function(e){if(cross[e.kamoku]&&e.kubun in cross[e.kamoku])cross[e.kamoku][e.kubun]+=(+e.amount||0);});
  var colTots={};
  crossKubun.forEach(function(ku){colTots[ku]=KAMOKU.reduce(function(s,k){return s+(cross[k][ku]||0);},0);});

  var crossRows="";
  KAMOKU.forEach(function(k){
    var rowT=crossKubun.reduce(function(s,ku){return s+(cross[k][ku]||0);},0);
    crossRows+="<tr><td"+(rowT===0?' style="color:var(--text3)"':'')+">"+k+"</td>";
    crossKubun.forEach(function(ku){
      var v=cross[k][ku]||0;
      crossRows+="<td"+(v===0?' style="color:var(--text3)"':'')+">"+( v>0?yen(v):"—")+"</td>";
    });
    crossRows+="<td class=\"tc\">"+(rowT>0?yen(rowT):"—")+"</td></tr>";
  });
  var crossFoot="<tr class=\"trow\"><td>合計</td>";
  crossKubun.forEach(function(ku){crossFoot+="<td>"+yen(colTots[ku])+"</td>";});
  crossFoot+="<td class=\"tc\">"+yen(c.expTotal)+"</td></tr>";

  var h="";
  // 合計バー（常に表示）
  h+='<div class="pbar"><div><div style="font-size:15px;font-weight:700">経費合計</div>'
    +'<div style="font-size:12px;color:var(--text3);margin-top:2px">'+fmtMonth(currentMonth)+'</div></div>'
    +'<span style="font-size:24px;font-weight:800;color:var(--red)">'+yen(c.expTotal)+'</span></div>';

  // サブタブ
  var subTabs=["入力","一覧","区分×科目"];
  h+='<div class="subtabs">';
  subTabs.forEach(function(t){
    h+='<button class="stab'+(expSubTab===t?" on":"")+'" onclick="setExpSubTab(\''+t+'\')">'+t+'</button>';
  });
  h+='</div>';

  // サブタブ別コンテンツ
  if(expSubTab==="入力"){
    h+='<div class="card">'
      +'<div class="ef">'
      +'<div class="fg"><label>日付</label><input type="date" id="fd" value="'+esc(expF.date)+'" oninput="expF.date=this.value"></div>'
      +'<div class="fg"><label>区分</label><select id="fk" onchange="expF.kubun=this.value">'+kubunOpts+'</select></div>'
      +'<div class="fg"><label>勘定科目</label><select id="fm" onchange="expF.kamoku=this.value">'+kamokuOpts+'</select></div>'
      +'<div class="fg"><label>詳細<span style="font-size:10px;color:var(--text3)"> 任意</span></label><input type="text" id="fdt" placeholder="省略可" value="'+esc(expF.detail)+'" oninput="expF.detail=this.value" onkeydown="if(event.key===\'Enter\')addExp()"></div>'
      +'<div class="fg"><label>金額</label><input type="number" id="fa" placeholder="0" value="'+expF.amount+'" oninput="expF.amount=this.value" onkeydown="if(event.key===\'Enter\')addExp()"></div>'
      +'<div class="fg" style="display:flex;align-items:flex-end"><button class="btn-add" onclick="addExp()">＋ 追加</button></div>'
      +'</div>'
      +tatekaeBar+recArea+'</div>';

  }else if(expSubTab==="一覧"){
    h+='<div class="card">'
      +fbar
      +'<div class="exp-list">'+listHtml+'</div>'
      +(filtered.length>0?'<div class="exp-total">'+(expFilter==="all"?"経費合計（関プ除く）":expFilter+" 合計")+'<span>'+yen(filteredTotal)+'</span></div>':"")
      +'</div>';
    // 立替サマリー
    var sk=mainE.filter(function(e){return e.tatekae==="関島";}).reduce(function(s,e){return s+(+e.amount||0);},0);
    var fn=mainE.filter(function(e){return e.tatekae==="船田";}).reduce(function(s,e){return s+(+e.amount||0);},0);
    if(sk>0||fn>0){
      h+='<div class="card">';
      if(sk>0) h+='<div class="sum-row"><span style="color:var(--purple);font-weight:600">関島立替合計</span><span style="color:var(--purple);font-weight:700">'+yen(sk)+'</span></div>';
      if(fn>0) h+='<div class="sum-row"><span style="color:var(--sky);font-weight:600">船田立替合計</span><span style="color:var(--sky);font-weight:700">'+yen(fn)+'</span></div>';
      h+='</div>';
    }
    // 関プセクション
    if(KANPU_MODE){
      var kanpuRows="";
      kanpuE.forEach(function(e){kanpuRows+=expRowHtml(e);});
      h+='<div class="card" style="border-color:var(--warn)">'
        +'<div class="ch">🔶 関プ経費<span style="font-size:11px;font-weight:400;color:var(--warn);margin-left:6px">独立（利益計算に含まない）</span></div>'
        +(kanpuE.length>0
          ?'<div class="exp-list">'+kanpuRows+'</div>'
           +'<div class="exp-total">関プ経費合計<span style="color:var(--warn)">'+yen(c.kanpuTotal)+'</span></div>'
          :'<div class="empty">関プ経費なし</div>')
        +'</div>';
    }

  }else if(expSubTab==="区分×科目"){
    if(mainE.length===0){
      h+='<div class="card"><div class="empty">経費データがありません</div></div>';
    }else{
      var ctHead="<thead><tr><th>勘定科目</th>";
      crossKubun.forEach(function(ku){ctHead+="<th>"+ku+"</th>";});
      ctHead+="<th class=\"tc\">合計</th></tr></thead>";
      h+='<div class="card"><div class="ov"><table class="ct">'+ctHead+'<tbody>'+crossRows+crossFoot+'</tbody></table></div></div>';
    }
  }

  return h;
}
function renderKeihi2(){
  if(currentTab==="経費") document.getElementById("mc").innerHTML=renderKeihi();
}
function setExpFilter(k){expFilter=k;renderKeihi2();}
function setExpSort(s){expSort=s;renderKeihi2();}
function setExpSubTab(t){expSubTab=t;renderKeihi2();}

function addExp(){
  var amt=parseFloat(String(expF.amount).replace(/,/g,""))||0;
  if(amt<=0){document.getElementById("fa").focus();return;}
  var md=getMonth(currentMonth);
  var exp={id:uid(),date:expF.date,kubun:expF.kubun,kamoku:expF.kamoku,detail:expF.detail,amount:amt,receiptUrl:expF.receiptUrl,tatekae:expF.tatekae};
  md.expenses=(md.expenses||[]).concat([exp]);
  expF={date:"",kubun:expF.kubun,kamoku:expF.kamoku,detail:"",amount:"",receiptUrl:"",receiptUploading:false,tatekae:""};
  setMonth(currentMonth,md);renderKeihi2();
}
function delExp(id){
  if(!confirm("削除しますか？"))return;
  var md=getMonth(currentMonth);
  md.expenses=(md.expenses||[]).filter(function(e){return e.id!==id;});
  setMonth(currentMonth,md);renderKeihi2();
}

/* 経費編集 */
function openEdit(id){
  editId=id;
  var md=getMonth(currentMonth);
  var e=(md.expenses||[]).find(function(x){return x.id===id;});
  if(!e)return;
  var ek=document.getElementById("ek"),em=document.getElementById("em");
  ek.innerHTML=KUBUN.map(function(k){return'<option'+(k===e.kubun?' selected':'')+'>'+k+'</option>';}).join("");
  em.innerHTML=KAMOKU.map(function(k){return'<option'+(k===e.kamoku?' selected':'')+'>'+k+'</option>';}).join("");
  document.getElementById("ed").value=e.date||"";
  document.getElementById("edt").value=e.detail||"";
  document.getElementById("ea").value=e.amount||"";
  editRecUrl=e.receiptUrl||"";
  editTatekae=e.tatekae||"";
  renderEditRec();renderEditTatekae();
  document.getElementById("editOverlay").classList.add("show");
}
function closeEdit(){document.getElementById("editOverlay").classList.remove("show");}
function saveEdit(){
  var amt=parseFloat(String(document.getElementById("ea").value).replace(/,/g,""))||0;
  if(amt<=0){document.getElementById("ea").focus();return;}
  var md=getMonth(currentMonth);
  md.expenses=(md.expenses||[]).map(function(e){
    if(e.id!==editId)return e;
    return Object.assign({},e,{date:document.getElementById("ed").value,kubun:document.getElementById("ek").value,kamoku:document.getElementById("em").value,detail:document.getElementById("edt").value,amount:amt,receiptUrl:editRecUrl,tatekae:editTatekae});
  });
  setMonth(currentMonth,md);closeEdit();renderKeihi2();
}
function renderEditTatekae(){
  var el=document.getElementById("editTatekaeArea");if(!el)return;
  var s='<div class="tatekae-bar">'
    +'<button class="tbtn sekijima'+(editTatekae==="関島"?" on":"")+'" onclick="toggleEditTatekae(\'sekijima\')">関島立替</button>'
    +'<button class="tbtn funada'+(editTatekae==="船田"?" on":"")+'" onclick="toggleEditTatekae(\'funada\')">船田立替</button>'
    +(editTatekae?'<span style="font-size:11px;color:var(--text3)">※もう一度で解除</span>':'')

function toggleEditTatekae(type){editTatekae=editTatekae===(type==="sekijima"?"関島":"船田")?"":type==="sekijima"?"関島":"船田";renderEditTatekae();}
function renderEditRec(){
  var el=document.getElementById("editRecArea");if(!el)return;
  var s="";
  if(editRecUrl){

/* 領収書アップロード */
async function handleRec(input){
  var file=input.files[0];if(!file)return;
  expF.receiptUploading=true;renderKeihi2();
  try{
    var ext=(file.name.split(".").pop())||"jpg";
    var fname=Date.now()+"_"+Math.random().toString(36).slice(2)+"."+ext;
    var r=await fetch(SB_URL+"/storage/v1/object/receipts/"+fname,{method:"POST",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":file.type,"x-upsert":"true"},body:file});
    if(!r.ok){var t=await r.text();throw new Error(t);}
    expF.receiptUrl=SB_URL+"/storage/v1/object/public/receipts/"+fname;
    uploadToGDrive(file,fname);
  }catch(e){alert("アップロードエラー: "+e.message);}
  expF.receiptUploading=false;input.value="";renderKeihi2();
}
async function handleEditRec(input){
  var file=input.files[0];if(!file)return;
  var sp=document.getElementById("editRecUploading");if(sp)sp.style.visibility="visible";
  try{
    var ext=(file.name.split(".").pop())||"jpg";
    var fname=Date.now()+"_"+Math.random().toString(36).slice(2)+"."+ext;
    var r=await fetch(SB_URL+"/storage/v1/object/receipts/"+fname,{method:"POST",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":file.type,"x-upsert":"true"},body:file});
    if(!r.ok){var t=await r.text();throw new Error(t);}
    editRecUrl=SB_URL+"/storage/v1/object/public/receipts/"+fname;
    uploadToGDrive(file,fname);
  }catch(e){alert("アップロードエラー: "+e.message);}
  if(sp)sp.style.visibility="hidden";input.value="";renderEditRec();
}
async function uploadToGDrive(file,fname){
  if(!GAS_URL||GAS_URL==="YOUR_GAS_URL_HERE")return;
  try{
    var b64=await new Promise(function(res,rej){var r=new FileReader();r.onload=function(e){res(e.target.result.split(",")[1]);};r.onerror=rej;r.readAsDataURL(file);});
    await fetch(GAS_URL,{method:"POST",body:JSON.stringify({data:b64,mimeType:file.type,name:fname})});
  }catch(e){console.warn("Googleドライブ保存失敗:",e.message);}
}
function openRec(url){document.getElementById("recImgWrap").innerHTML='<img src="'+url+'" alt="領収書">';document.getElementById("recOverlay").classList.add("show");}
function closeRec(){document.getElementById("recOverlay").classList.remove("show");}

  var up=Math.round(pts*4/100/1.05*1.1);
  var subtotal=base+up;
  var fee=Math.round(subtotal*0.02);
  var total=subtotal-fee;
  var tax=Math.round(total*10/11);
  return{base,up,subtotal,fee,total,tax};
}
function showNotice(name,pts){
  var today=new Date();
  var dateStr=today.getFullYear()+'年'+(today.getMonth()+1)+'月'+today.getDate()+'日';
  var p=currentMonth.split("-");var y=p[0],m=+p[1];
  var periodStr=y+'年'+m+'月後半分';
  var payDate=y+'年'+(m+1>12?1:m+1)+'月20日';
  var a=calcNoticeAmounts(pts);
  var h=buildNoticeHeader(dateStr,name,'支払通知書',true)+buildNoticeBody(pts,periodStr,a.base,a.up,a.subtotal,a.fee,a.total,a.tax,payDate);
  document.getElementById("noticeBody").innerHTML=h;
  document.getElementById("noticeOverlay").classList.add("show");
}
async function generateNoticePdf(tid){
  openTalentNotice(tid);
  await new Promise(function(r){setTimeout(r,400);});
  var el=document.getElementById("noticeBody");
  var tmpDiv=document.createElement("div");
  tmpDiv.style.cssText="position:fixed;left:-9999px;top:0;width:520px;background:#fff;padding:20px;box-sizing:border-box";
  tmpDiv.innerHTML=el.innerHTML;
  document.body.appendChild(tmpDiv);
  var canvas=await html2canvas(tmpDiv,{scale:2,useCORS:true,backgroundColor:"#ffffff"});
  document.body.removeChild(tmpDiv);
  document.getElementById("noticeOverlay").classList.remove("show");
  var imgData=canvas.toDataURL("image/jpeg",0.92);
  var pdf=new window.jspdf.jsPDF({unit:"px",format:[canvas.width/2,canvas.height/2]});
  pdf.addImage(imgData,"JPEG",0,0,canvas.width/2,canvas.height/2);
  return pdf.output("blob");
}
async function uploadAndSendLine(tid,realName,pdfBlob){
  var fileName="notices/"+tid+"_"+Date.now()+".pdf";
  var upRes=await fetch(SB_URL+"/storage/v1/object/receipts/"+fileName,{
    method:"POST",
    headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,"Content-Type":"application/pdf","x-upsert":"true"},
    body:pdfBlob
  });
  if(!upRes.ok){var et=await upRes.text();throw new Error("アップロード失敗: "+et);}
  var pdfUrl=SB_URL+"/storage/v1/object/public/receipts/"+fileName;
  var gasUrl=LINE_GAS_URL+"?action=sendPdf&realName="+encodeURIComponent(realName)+"&pdfUrl="+encodeURIComponent(pdfUrl);
  var res=await fetch(gasUrl);
  var json=await res.json();
  if(!json.success||!json.data||!json.data.ok) throw new Error((json.data&&json.data.error)||"不明なエラー");
}
function showSending(msg){var o=document.getElementById("sendingOverlay");o.style.display="flex";document.getElementById("sendingMsg").textContent=msg||"送信中...";}
function hideSending(){document.getElementById("sendingOverlay").style.display="none";}
async function sendLineNotice(tid){
  var t=master.talents.find(function(x){return x.id===tid;});
  if(!t)return;
  if(!t.realName){alert("本名が設定されていないため送信できません");return;}
  if(LINE_GAS_URL==="YOUR_LINE_GAS_URL_HERE"){alert("LINE_GAS_URLを設定してください");return;}
  if(!window.html2canvas||!window.jspdf){alert("PDFライブラリ読み込み中です。少し待って再試行してください");return;}
  showSending("送信中: "+t.realName);
  try{
    var blob=await generateNoticePdf(tid);
    await uploadAndSendLine(tid,t.realName,blob);
    hideSending();alert("LINE送信完了: "+t.realName);
  }catch(e){hideSending();alert("LINE送信失敗: "+e.message);}
}
async function sendLineNoticeAll(){
  if(LINE_GAS_URL==="YOUR_LINE_GAS_URL_HERE"){alert("LINE_GAS_URLを設定してください");return;}
  if(!window.html2canvas||!window.jspdf){alert("PDFライブラリ読み込み中です。少し待って再試行してください");return;}
  var talents=master.talents.filter(function(t){return t.realName;});
  if(!talents.length){alert("本名が設定されているタレントがいません");return;}
  if(!confirm(talents.length+"名に一括送信します。よろしいですか？")){return;}
  var sent=[],skipped=[],failed=[];
  for(var i=0;i<talents.length;i++){
    var t=talents[i];
    showSending((i+1)+"/"+talents.length+" 確認中: "+t.realName);
    try{
      var checkRes=await fetch(LINE_GAS_URL+"?action=getUserId&realName="+encodeURIComponent(t.realName));
      var checkJson=await checkRes.json();
      if(!checkJson.success||!checkJson.data||!checkJson.data.userId){skipped.push(t.realName);continue;}
    }catch(e){skipped.push(t.realName);continue;}
    showSending((i+1)+"/"+talents.length+" 送信中: "+t.realName);
    try{
      var blob=await generateNoticePdf(t.id);
      await uploadAndSendLine(t.id,t.realName,blob);
      sent.push(t.realName);
    }catch(e){failed.push(t.realName);}
  }
  hideSending();
  var msg="LINE一括送信完了\n✅ 送信("+sent.length+"): "+(sent.join("、")||"なし")+"\n⏭️ 未登録スキップ("+skipped.length+"): "+(skipped.join("、")||"なし")+(failed.length?"\n❌ 失敗("+failed.length+"): "+failed.join("、"):"");
  alert(msg);
}
function openTalentNotice(tid){
  var t=master.talents.find(function(x){return x.id===tid;});
  if(!t)return;
  var md=getMonth(currentMonth);
  var today=new Date();
  var dateStr=today.getFullYear()+'年'+(today.getMonth()+1)+'月'+today.getDate()+'日';
  var p2=currentMonth.split("-");var y=p2[0],m=+p2[1];
  var periodStr=y+'年'+m+'月後半分';
  var payDate=y+'年'+(m+1>12?1:m+1)+'月20日';
  var name=t.realName||t.name;
  var rows=[],grandTotal=0;
  (t.platforms||[]).forEach(function(pid){
    var pl=master.platforms.find(function(x){return x.id===pid;});if(!pl)return;
    var entry=((md.talent||{})[t.id]||{})[pid]||{pts:0};
    var pts=+(entry.pts||0)-getDailyTotal(entry);
    var rate=(t.rates&&t.rates[pid]!=null)?t.rates[pid]:pl.rate;
    var amt=Math.round(pts*rate/100);
    grandTotal+=amt;
    rows.push({name:esc(pl.name)+' '+m+'月分',pts:+(entry.pts||0),rate:rate,amt:amt});
  });
  var h=buildNoticeHeader(dateStr,name,'給料明細',false);
  h+='<div style="font-size:12px;margin-bottom:20px">平素は格別なるご高配を賜り厚く御礼申し上げます。<br>以下の通り、お支払いのご案内となります。今後とも宜しくお願い致します。</div>';
  // 外注があれば後で加算するのでプレースホルダーIDを使う
  h+='<div id="notice-total-box" style="border:2px solid #000;padding:12px 20px;margin-bottom:20px;text-align:center">'
    +'<div style="font-size:13px;margin-bottom:4px">お支払金額</div>'
    +'<div id="notice-grand-total" style="font-size:28px;font-weight:800">¥'+grandTotal.toLocaleString()+'</div>'
    +'<div style="font-size:12px;color:#555;margin-top:4px">ライブチャット出演料として</div>'
    +'</div>';
  h+='<div style="font-size:13px;font-weight:700;margin-bottom:6px">タレント報酬</div>';
  h+='<table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px">'
    +'<thead><tr style="background:#f5f5f4">'
    +'<th style="padding:6px 8px;border:1px solid #ccc;text-align:left">明細</th>'
    +'<th style="padding:6px 8px;border:1px solid #ccc;text-align:right">ポイント</th>'
    +'<th style="padding:6px 8px;border:1px solid #ccc;text-align:center">料率</th>'
    +'<th style="padding:6px 8px;border:1px solid #ccc;text-align:right">金額</th>'
    +'</tr></thead><tbody>';
  rows.forEach(function(r){
    h+='<tr><td style="padding:6px 8px;border:1px solid #ccc;padding-left:20px">'+r.name+'</td>'
      +'<td style="padding:6px 8px;border:1px solid #ccc;text-align:right">'+r.pts.toLocaleString()+'pt</td>'
      +'<td style="padding:6px 8px;border:1px solid #ccc;text-align:center">'+r.rate+'%</td>'
      +'<td style="padding:6px 8px;border:1px solid #ccc;text-align:right">¥'+r.amt.toLocaleString()+'</td></tr>';
  });
  var tNames=[t.name,t.realName].filter(Boolean);
  master.outsource.forEach(function(o2){
    var nameMatch=tNames.some(function(n){return o2.name===n;});
    if(!nameMatch)return;
    var linked2=master.talents.filter(function(lt){return lt.outsourceId===o2.id;});
    var totalPts2;
    if(linked2.length>0){
      totalPts2=0;
      linked2.forEach(function(lt){
        (lt.platforms||[]).forEach(function(pid){
          var e2=((md.talent||{})[lt.id]||{})[pid]||{pts:0};
          totalPts2+=+(e2.pts||0);
        });
      });
    }else{
      totalPts2=+(md.outsource[o2.id]||0);
    }
    var outAmt2=calcOutAmt(o2,totalPts2);
    grandTotal+=outAmt2;
    h+='<tr><td style="padding:6px 8px;border:1px solid #ccc;padding-left:20px">'+esc(o2.name)+' '+m+'月分（外注報酬）</td>'
      +'<td style="padding:6px 8px;border:1px solid #ccc;text-align:right">'+totalPts2.toLocaleString()+'pt</td>'
      +'<td style="padding:6px 8px;border:1px solid #ccc;text-align:center">'+o2.rate+'%</td>'
      +'<td style="padding:6px 8px;border:1px solid #ccc;text-align:right">¥'+outAmt2.toLocaleString()+'</td></tr>';
  });
  (t.noticeItems||[]).forEach(function(item){
    grandTotal+=item.amount;
    var amtStr=(item.amount<0?'-':'')+'¥'+Math.abs(item.amount).toLocaleString();
    h+='<tr><td colspan="3" style="padding:6px 8px;border:1px solid #ccc;padding-left:20px">'+esc(item.name)+'</td>'
      +'<td style="padding:6px 8px;border:1px solid #ccc;text-align:right;color:'+(item.amount<0?'var(--red)':'inherit')+'">'+amtStr+'</td></tr>';
  });
  h+='</tbody></table>';
  h+='<div style="display:flex;justify-content:flex-end;margin-bottom:20px">'
    +'<table style="border-collapse:collapse;font-size:12px;min-width:260px">'
    +'<tr style="background:#f5f5f4;font-weight:700"><td style="padding:6px 12px;border:1px solid #ccc">合計</td>'
    +'<td style="padding:6px 12px;border:1px solid #ccc;text-align:right">¥'+grandTotal.toLocaleString()+'</td></tr>'
    +'</table></div>';
  h+='<div style="font-size:12px;color:#555">支払予定日：'+payDate+'<br>※土日祝の場合、翌銀行営業日になります。</div>';
  h+='</div>';
  document.getElementById("noticeBody").innerHTML=h;
  var gt=document.getElementById("notice-grand-total");
  if(gt) gt.textContent='¥'+grandTotal.toLocaleString();
  document.getElementById("noticeOverlay").classList.add("show");
}
function openPaymentNotice(oid){
  var o=master.outsource.find(function(x){return x.id===oid;});
  if(!o)return;
  var md=getMonth(currentMonth);
  // ポイント取得（紐づきタレントの合計）
  var linked=master.talents.filter(function(t){return t.outsourceId===oid;});
  var pts=0;
  if(linked.length>0){
    linked.forEach(function(t){
      (t.platforms||[]).forEach(function(pid){
        var entry=((md.talent||{})[t.id]||{})[pid]||{pts:0};
        pts+=+(entry.pts||0);
      });
    });
  }else{
    pts=+(md.outsource[oid]||0);
  }
  showNotice(esc(o.name),pts);
}
function closePaymentNotice(){document.getElementById("noticeOverlay").classList.remove("show");}
function printNotice(){
  var content=document.getElementById("noticeBody").innerHTML;
  var w=window.open("","_blank","width=700,height=900");
  w.document.write('<html><head><title> </title><style>'
    +'body{font-family:"メイリオ",sans-serif;margin:20px}'
    +'@page{margin:0;size:A4}'
    +'@media print{body{margin:15mm}header,footer{display:none}}'
    +'</style></head><body>'+content
    +'<script>window.onload=function(){window.print();}<\/script></body></html>');
  w.document.close();
}
function toggleOutDetail(id){
  var el=document.getElementById(id);if(!el)return;
  var btn=el.previousElementSibling&&el.previousElementSibling.querySelector("button");
  if(el.style.display==="none"){
    el.style.display="";
    if(btn)btn.textContent="▼ 明細を閉じる";
  }else{
    el.style.display="none";
    if(btn&&btn.dataset.origText)btn.textContent=btn.dataset.origText;
  }
}
function updateOutModal(){
  var f=(document.getElementById("mm-formula")||{}).value||"simple";
  var r=parseFloat((document.getElementById("mm-rate")||{}).value)||0;
  var lbl=document.getElementById("mm-rate-label");
  if(lbl) lbl.textContent=f==="uriage"?"独自率（%）":"報酬率（%）";
  var prev=document.getElementById("mm-formula-preview");
  if(prev){
    if(f==="uriage") prev.textContent="計算例：10,000pt → ¥"+Math.round(10000*0.57/1.05*1.1*r/100).toLocaleString();
    else prev.textContent="計算例：10,000pt × "+r+"% = ¥"+Math.round(10000*r/100).toLocaleString();
  }
}
function getDailyTotal(entry){
  if(entry.dailyEntries&&entry.dailyEntries.length) return entry.dailyEntries.reduce(function(s,e){return s+(+(e.pts||0));},0);
  return +(entry.daily||0); // 旧データ互換
}
function calcOutAmt(o,pts){
  if(o.formula==="abe") return Math.round(pts*o.rate/100/1.05*1.1*0.98);
  return Math.round(pts*o.rate/100);
}
function calcIncAmt(p,pts){
  if(p.formula==="uriage") return Math.round(pts*0.57/1.05*1.1);
  return Math.round(pts*(p.rate||0)/100);
}
function updateIncModal(){
  var f=(document.getElementById("mm-formula")||{}).value||"simple";
  var r=parseFloat((document.getElementById("mm-rate")||{}).value)||0;
  var wrap=document.getElementById("mm-rate-wrap");
  if(wrap) wrap.style.display=f==="uriage"?"none":"block";
  var prev=document.getElementById("mm-inc-preview");
  if(prev){
    if(f==="uriage") prev.textContent="計算例：10,000pt → ¥"+Math.round(10000*0.57/1.05*1.1).toLocaleString();
    else prev.textContent="計算例：10,000pt × "+r+"% = ¥"+Math.round(10000*r/100).toLocaleString();
  }
}
function closeMasterModal(){document.getElementById("masterOverlay").classList.remove("show");}
function saveMasterModal(){
  var type=mModalType,id=mModalId;
  var name=(document.getElementById("mm-name")||{}).value||"";
  if(!name.trim()){alert("名前を入力してください");return;}

  if(type==="platform"){
    var rate=parseFloat((document.getElementById("mm-rate")||{}).value)||0;
    var pformula=(document.getElementById("mm-formula")||{}).value||"simple";
    if(id){
      master.platforms=master.platforms.map(function(p){return p.id===id?Object.assign({},p,{name:name,rate:rate,formula:pformula}):p;});
    }else{
      master.platforms=master.platforms.concat([{id:uid(),name:name,rate:rate,formula:pformula}]);
    }
  }else if(type==="talent"){
    var platforms=Array.from(document.querySelectorAll("#mm-platforms button")).filter(function(b){return b.style.background==='var(--blue)';}).map(function(b){return b.dataset.pid;});
    var realName=(document.getElementById("mm-realname")||{}).value||"";
    var fanzaCharId=(document.getElementById("mm-fanzaid")||{}).value||"";
    var outsourceId=(document.getElementById("mm-outsource")||{}).value||"";
    var rates={};
    document.querySelectorAll("#mm-platforms input[data-rate-pid]").forEach(function(el){
      var v=parseFloat(el.value);
      if(!isNaN(v)&&v>0) rates[el.dataset.ratePid]=v;
    });
    var noticeItems=[];
    document.querySelectorAll("#mm-notice-items>div").forEach(function(row){
      var nm=(row.querySelector("input[type=text]")||{}).value||"";
      var am=parseFloat((row.querySelector("input[type=number]")||{}).value);
      var signBtn=row.querySelector("button");
      var sign=(signBtn&&signBtn.textContent==='－')?-1:1;
      if(nm.trim()&&!isNaN(am)) noticeItems.push({name:nm.trim(),amount:sign*Math.abs(am)});
    });
    if(id){
      master.talents=master.talents.map(function(t){return t.id===id?Object.assign({},t,{name:name,realName:realName,fanzaCharId:fanzaCharId,outsourceId:outsourceId,platforms:platforms,rates:rates,noticeItems:noticeItems}):t;});
    }else{
      master.talents=master.talents.concat([{id:uid(),name:name,realName:realName,fanzaCharId:fanzaCharId,outsourceId:outsourceId,platforms:platforms,rates:rates,noticeItems:noticeItems}]);
    }
  }else if(type==="staff"){
    var stype=(document.getElementById("mm-type")||{}).value||"fixed";
    var samount=parseFloat((document.getElementById("mm-amount")||{}).value)||0;
    var newS={name:name,type:stype,amount:samount};
    if(id){
      master.staff=master.staff.map(function(s){return s.id===id?Object.assign({},s,newS):s;});
    }else{
      master.staff=master.staff.concat([Object.assign({id:uid()},newS)]);
    }
  }else if(type==="outsource"){
    var orate=parseFloat((document.getElementById("mm-rate")||{}).value)||0;
    var oformula=(document.getElementById("mm-formula")||{}).value||"simple";
    if(id){
      master.outsource=master.outsource.map(function(o){return o.id===id?Object.assign({},o,{name:name,rate:orate,formula:oformula}):o;});
    }else{
      master.outsource=master.outsource.concat([{id:uid(),name:name,rate:orate,formula:oformula}]);
    }
  }

  scheduleSaveMaster();
  closeMasterModal();
  render();
}
function deleteMaster(type,id){
  if(!confirm("削除しますか？"))return;
  if(type==="platform") master.platforms=master.platforms.filter(function(x){return x.id!==id;});
  else if(type==="talent") master.talents=master.talents.filter(function(x){return x.id!==id;});
  else if(type==="staff") master.staff=master.staff.filter(function(x){return x.id!==id;});
  else if(type==="outsource") master.outsource=master.outsource.filter(function(x){return x.id!==id;});
  scheduleSaveMaster();render();
}
